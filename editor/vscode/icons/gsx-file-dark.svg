<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-labelledby="v1-title">
  <title id="v1-title">.gsx file icon — stacked blocks</title>
  <!-- Pure pixel-art "gsx" — bold block letters with offset shadow.
       Grid: 5 rows × 5px pitch, 4px block height. 18px wide per letter, 5px gaps.
       G at x=0, S at x=23, X at x=46. Rows at y=20,25,30,35,40.
       g = pink #f92672, s = green #a6e22e, x = cyan #66d9ef
       Shadow: offset +2,+2, width-1, height=3, 35% opacity. -->

  <!-- ═══ Shadow layer ═══ -->

  <!-- G shadow -->
  <g fill="#f92672" opacity="0.35">
    <rect x="6"  y="22" width="13" height="3"/>
    <rect x="2"  y="27" width="4"  height="3"/>
    <rect x="2"  y="32" width="4"  height="3"/><rect x="11" y="32" width="8" height="3"/>
    <rect x="2"  y="37" width="4"  height="3"/><rect x="15" y="37" width="4" height="3"/>
    <rect x="6"  y="42" width="13" height="3"/>
  </g>

  <!-- S shadow -->
  <g fill="#a6e22e" opacity="0.35">
    <rect x="29" y="22" width="13" height="3"/>
    <rect x="25" y="27" width="4"  height="3"/>
    <rect x="29" y="32" width="9"  height="3"/>
    <rect x="38" y="37" width="4"  height="3"/>
    <rect x="25" y="42" width="13" height="3"/>
  </g>

  <!-- X shadow -->
  <g fill="#66d9ef" opacity="0.35">
    <rect x="48" y="22" width="4" height="3"/><rect x="61" y="22" width="3" height="3"/>
    <rect x="51" y="27" width="4" height="3"/><rect x="58" y="27" width="4" height="3"/>
    <rect x="54" y="32" width="5" height="3"/>
    <rect x="51" y="37" width="4" height="3"/><rect x="58" y="37" width="4" height="3"/>
    <rect x="48" y="42" width="4" height="3"/><rect x="61" y="42" width="3" height="3"/>
  </g>

  <!-- ███ Main layer ███ -->

  <!-- G main — top bar, left arm, shelf, right arm, bottom bar -->
  <g fill="#f92672">
    <rect x="4"  y="20" width="14" height="4"/>
    <rect x="0"  y="25" width="5"  height="4"/>
    <rect x="0"  y="30" width="5"  height="4"/><rect x="9"  y="30" width="9" height="4"/>
    <rect x="0"  y="35" width="5"  height="4"/><rect x="13" y="35" width="5" height="4"/>
    <rect x="4"  y="40" width="14" height="4"/>
  </g>

  <!-- S main — top bar (right-biased), left arm, middle bar, right arm, bottom bar (left-biased) -->
  <g fill="#a6e22e">
    <rect x="27" y="20" width="14" height="4"/>
    <rect x="23" y="25" width="5"  height="4"/>
    <rect x="27" y="30" width="10" height="4"/>
    <rect x="36" y="35" width="5"  height="4"/>
    <rect x="23" y="40" width="14" height="4"/>
  </g>

  <!-- X main — converging diagonal arms to center -->
  <g fill="#66d9ef">
    <rect x="46" y="20" width="5" height="4"/><rect x="59" y="20" width="5" height="4"/>
    <rect x="49" y="25" width="5" height="4"/><rect x="56" y="25" width="5" height="4"/>
    <rect x="52" y="30" width="6" height="4"/>
    <rect x="49" y="35" width="5" height="4"/><rect x="56" y="35" width="5" height="4"/>
    <rect x="46" y="40" width="5" height="4"/><rect x="59" y="40" width="5" height="4"/>
  </g>
</svg>
